<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>交替倒计时闹钟 · 10秒/5秒重复20次</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a26 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 40px 32px;
            width: 460px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255,255,255,0.06);
            color: #eef4ff;
            transition: all 0.2s;
        }
        h2 {
            font-weight: 500;
            font-size: 1.9rem;
            letter-spacing: 1px;
            margin: 0 0 12px 0;
            text-align: center;
            color: #c1d9ff;
            text-shadow: 0 2px 5px rgba(0,20,50,0.7);
        }
        .sub {
            text-align: center;
            font-size: 1rem;
            color: #9bb5e0;
            margin-bottom: 40px;
            border-bottom: 1px dashed #3e5570;
            padding-bottom: 16px;
        }
        .timer-block {
            background: #0e1a28;
            border-radius: 80px;
            padding: 30px 20px;
            margin-bottom: 32px;
            border: 1px solid #3e5a7c;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.7), 0 10px 20px rgba(0,10,20,0.8);
        }
        .big-number {
            font-size: 6rem;
            font-weight: 600;
            text-align: center;
            line-height: 1;
            margin: 0;
            color: #b8dcff;
            font-feature-settings: "tnum";
            text-shadow: 0 0 20px #3f9eff;
            letter-spacing: 4px;
        }
        .unit {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-left: 5px;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            background: #1b2b3f;
            border-radius: 60px;
            padding: 18px 28px;
            margin: 24px 0 18px;
            border: 1px solid #4c6f94;
            font-weight: 400;
            font-size: 1.2rem;
            backdrop-filter: blur(4px);
        }
        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .info-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #95adcf;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 2rem;
            font-weight: 500;
            margin-top: 5px;
            color: #ffecbb;
        }
        .badge {
            background: #2f4770;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            width: fit-content;
            margin: 8px auto 18px;
            border: 1px solid #7299cc;
            color: #e1efff;
        }
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 18px;
        }
        button {
            background: #2c405e;
            border: none;
            border-radius: 60px;
            padding: 16px 36px;
            font-size: 1.4rem;
            font-weight: 500;
            color: #eaf2ff;
            cursor: pointer;
            flex: 1;
            transition: 0.15s;
            box-shadow: 0 8px 0 #0e1a2b, 0 6px 12px black;
            border: 1px solid #5a7aa8;
            letter-spacing: 1px;
        }
        button:hover:not(:disabled) {
            background: #3e5b84;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0e1a2b, 0 10px 18px black;
        }
        button:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #0e1a2b, 0 8px 12px black;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: 0 5px 0 #0e1a2b;
            transform: translateY(3px);
        }
        #stopBtn {
            background: #4f3f5c;
            border-color: #a07e9e;
        }
        #stopBtn:hover:not(:disabled) {
            background: #6c5380;
        }
        .status-text {
            text-align: center;
            margin-top: 25px;
            font-size: 1.1rem;
            color: #bcd2ff;
        }
        .footnote {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #5f799b;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>⏰ 交替 · 闹钟</h2>
    <div class="sub">10秒 / 5秒  &nbsp; 重复20次</div>

    <div class="timer-block">
        <div class="big-number" id="timerDisplay">0</div>
    </div>

    <div class="info-panel">
        <div class="info-item">
            <span class="info-label">当前间隔</span>
            <span class="info-value" id="intervalType">--</span>
        </div>
        <div class="info-item">
            <span class="info-label">进度</span>
            <span class="info-value" id="progress">0/20</span>
        </div>
    </div>

    <div class="badge" id="currentCountDisplay">第 0 次</div>

    <div class="button-group">
        <button id="startBtn">▶ 开始</button>
        <button id="stopBtn" disabled>⏹ 停止</button>
    </div>

    <div class="status-text" id="statusMessage">⏳ 等待开始</div>
    <div class="footnote">🔊 智能语音 · 屏幕常亮 · 无弹窗</div>
</div>

<script>
    (function() {
        // ----- DOM 元素 -----
        const timerDisplay = document.getElementById('timerDisplay');
        const intervalTypeSpan = document.getElementById('intervalType');
        const progressSpan = document.getElementById('progress');
        const currentCountSpan = document.getElementById('currentCountDisplay');
        const statusMsg = document.getElementById('statusMessage');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        // ----- 核心变量 -----
        let running = false;                // 是否正在倒计时
        let currentIndex = 0;                // 0 ~ 19, 表示即将执行的第几次 (0代表第一次)
        const TOTAL = 20;                    // 总闹钟次数

        let timeoutId = null;                // setTimeout 句柄
        let intervalId = null;               // 每秒更新显示句柄
        let endTime = null;                   // 当前倒计时目标时间戳 (毫秒)

        // ----- 屏幕常亮相关 -----
        let wakeLock = null;                  // 唤醒锁对象

        // 请求屏幕常亮
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('屏幕常亮已激活');
                    
                    // 监听释放事件（例如用户切换到其他应用可能导致自动释放）
                    wakeLock.addEventListener('release', () => {
                        console.log('屏幕常亮已释放');
                    });
                } catch (err) {
                    console.error('唤醒锁请求失败:', err);
                }
            } else {
                console.warn('当前浏览器不支持 Wake Lock API');
            }
        }

        // 释放屏幕常亮
        async function releaseWakeLock() {
            if (wakeLock !== null) {
                try {
                    await wakeLock.release();
                    wakeLock = null;
                    console.log('屏幕常亮已手动释放');
                } catch (err) {
                    console.error('释放唤醒锁失败:', err);
                }
            }
        }

        // ----- 辅助函数: 停止所有定时器 -----
        function clearAllTimers() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
        }

        // ----- 更新UI (剩余秒数、间隔类型、进度) -----
        function refreshUI() {
            if (!running) {
                return;
            }

            if (currentIndex < TOTAL) {
                const intervalSec = (currentIndex % 2 === 0) ? 10 : 5;
                intervalTypeSpan.textContent = intervalSec + '秒';
            } else {
                intervalTypeSpan.textContent = '--';
            }

            progressSpan.textContent = (currentIndex + 1) + '/' + TOTAL;
            currentCountSpan.textContent = `第 ${currentIndex + 1} 次`;

            if (endTime) {
                const now = Date.now();
                let remainSec = Math.max(0, Math.round((endTime - now) / 1000));
                timerDisplay.textContent = remainSec;
            } else {
                timerDisplay.textContent = '0';
            }
        }

        // ----- 每秒更新计时器 -----
        function tick() {
            if (!running || !endTime) {
                return;
            }
            const now = Date.now();
            let remainSec = Math.max(0, Math.round((endTime - now) / 1000));
            timerDisplay.textContent = remainSec;

            if (remainSec <= 0) {
                timerDisplay.textContent = '0';
            }
        }

          // ----- 智能语音提醒 (返回Promise，在播放结束后resolve) -----
function ringAlarm() {
    return new Promise((resolve) => {
        // 确定要播放的语音文本
        let speechText = '';
        let statusText = '';

        if (currentIndex % 2 === 0) {
            speechText = '暂停';
            statusText = '⏸ 暂停...';
        } else {
            speechText = '开始';
            statusText = '▶ 开始...';
        }

        statusMsg.textContent = statusText;

        // 如果不支持语音，直接resolve
        if (!('speechSynthesis' in window)) {
            statusMsg.textContent = speechText; // 至少显示文字
            setTimeout(resolve, 600); // 给一点文字展示时间
            return;
        }

        try {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(speechText);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.volume = 1;

            // 尝试使用中文语音
            const voices = window.speechSynthesis.getVoices();
            const chineseVoice = voices.find(voice => 
                voice.lang.includes('zh') || voice.lang.includes('cmn')
            );
            if (chineseVoice) {
                utterance.voice = chineseVoice;
            }

            // 语音播放结束时 resolve
            utterance.onend = () => {
                resolve();
            };
            // 如果出错也 resolve（避免卡死）
            utterance.onerror = () => {
                console.warn('语音播放出错');
                resolve();
            };

            window.speechSynthesis.speak(utterance);

            // 保险：如果浏览器不支持 onend 事件或长时间不触发，最多等2秒自动resolve
            setTimeout(resolve, 2000);
        } catch (e) {
            console.warn('语音失败', e);
            resolve();
        }
    });
}

// ----- 单个倒计时结束处理 -----
async function handleTimeout() {
    // 清除interval
    if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
    }

    if (!running) return;

    // 发出智能提醒，并等待播放结束（或超时）
    await ringAlarm();

    // 如果在这期间用户点了停止，就不继续了
    if (!running) return;

    // 当前这一轮结束，索引增加
    currentIndex++;

    // 检查是否完成全部20次
    if (currentIndex >= TOTAL) {
        // 全部完成
        running = false;
        clearAllTimers();
        endTime = null;

        // 播放完成语音
        if ('speechSynthesis' in window) {
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance('本轮20次已做完');
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                console.warn('完成语音失败', e);
            }
        }

        // 更新UI
        intervalTypeSpan.textContent = '--';
        progressSpan.textContent = '20/20';
        currentCountSpan.textContent = '第 20 次 (完成)';
        timerDisplay.textContent = '0';
        statusMsg.textContent = '✅ 已完成20次闹钟';
        startBtn.disabled = false;
        stopBtn.disabled = true;

        // 释放屏幕常亮
        releaseWakeLock();
        return;
    }

    // 继续下一个倒计时
    startNext();
}
        // ----- 开始下一个倒计时 -----
        function startNext() {
            clearAllTimers();

            if (!running) return;

            if (currentIndex >= TOTAL) {
                running = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                statusMsg.textContent = '🏁 全部闹钟已结束';
                releaseWakeLock();
                return;
            }

            const duration = (currentIndex % 2 === 0) ? 10 : 5;
            const now = Date.now();
            endTime = now + duration * 1000;

            intervalTypeSpan.textContent = duration + '秒';
            progressSpan.textContent = (currentIndex + 1) + '/' + TOTAL;
            currentCountSpan.textContent = `第 ${currentIndex + 1} 次`;
            timerDisplay.textContent = duration;
            statusMsg.textContent = `🔊 倒计时进行中 (${duration}秒)`;

            intervalId = setInterval(tick, 200);
            timeoutId = setTimeout(handleTimeout, duration * 1000);
        }

        // ----- 停止/重置 -----
        function stopReset(resetIndex = true) {
            clearAllTimers();
            running = false;
            endTime = null;

            if (resetIndex) {
                currentIndex = 0;
            }

            intervalTypeSpan.textContent = '--';
            progressSpan.textContent = (resetIndex ? '0/20' : (currentIndex + 1) + '/20');
            currentCountSpan.textContent = resetIndex ? '第 0 次' : `第 ${currentIndex + 1} 次`;
            timerDisplay.textContent = '0';
            statusMsg.textContent = '⏸ 已停止';
            startBtn.disabled = false;
            stopBtn.disabled = true;

            // 释放屏幕常亮
            releaseWakeLock();
        }

        // ----- 开始按钮逻辑 -----
        async function startFresh() {
            // 先请求屏幕常亮（需要用户手势）
            await requestWakeLock();

            if (running) {
                stopReset(true);
            } else {
                currentIndex = 0;
                intervalTypeSpan.textContent = '--';
                progressSpan.textContent = '0/20';
                currentCountSpan.textContent = '第 0 次';
                timerDisplay.textContent = '0';
            }

            clearAllTimers();
            endTime = null;

            running = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusMsg.textContent = '🚀 启动第一次 (10秒)';

            startNext();
        }

        // ----- 停止按钮 -----
        function stopAction() {
            if (!running) return;
            clearAllTimers();
            running = false;
            endTime = null;

            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusMsg.textContent = `⏸ 已暂停于第 ${currentIndex + 1} 次`;
            timerDisplay.textContent = '0';

            // 释放屏幕常亮
            releaseWakeLock();
        }

        // ----- 绑定事件 -----
        startBtn.addEventListener('click', startFresh);
        stopBtn.addEventListener('click', stopAction);

        // 初始化显示
        stopReset(true);
    })();
</script>
</body>
</html>
